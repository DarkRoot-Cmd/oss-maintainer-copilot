name: OSS Maintainer Copilot Audit
description: Run repository maintainer-readiness checks.
inputs:
  repo:
    description: Repository path
    required: false
    default: .
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - shell: bash
      run: python -m pip install -e .
    - shell: bash
      run: oss-maintainer-copilot audit --repo "${{ inputs.repo }}"
